<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Yellow Metal">
  <defs>
    <linearGradient id="ym-gold-face" x1="16" y1="8" x2="16" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F2DC7A"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8891A"/>
    </linearGradient>
    <linearGradient id="ym-gold-top" x1="16" y1="7" x2="16" y2="11" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4C4"/>
      <stop offset="100%" stop-color="#E8C84A"/>
    </linearGradient>
    <linearGradient id="ym-gold-left" x1="4" y1="16" x2="8" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="ym-gold-right" x1="24" y1="16" x2="28" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4941F"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
    <linearGradient id="ym-gold-bottom" x1="16" y1="21" x2="16" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4941F"/>
      <stop offset="100%" stop-color="#6E520E"/>
    </linearGradient>
    <clipPath id="ym-gold-clip">
      <rect x="5" y="9" width="22" height="14" rx="3.5" ry="3.5"/>
    </clipPath>
  </defs>

  <!-- Gold brick: rounded bar with beveled rim -->
  <g clip-path="url(#ym-gold-clip)">
    <rect x="5" y="9" width="22" height="14" fill="url(#ym-gold-face)"/>
    <rect x="5" y="9" width="22" height="3.25" fill="url(#ym-gold-top)"/>
    <rect x="5" y="9" width="3.25" height="14" fill="url(#ym-gold-left)"/>
    <rect x="23.75" y="9" width="3.25" height="14" fill="url(#ym-gold-right)"/>
    <rect x="5" y="19.75" width="22" height="3.25" fill="url(#ym-gold-bottom)"/>
  </g>

  <!-- Outer rim — brick edge definition -->
  <rect
    x="5"
    y="9"
    width="22"
    height="14"
    rx="3.5"
    ry="3.5"
    fill="none"
    stroke="#9A7209"
    stroke-width="0.75"
  />
  <rect
    x="5.75"
    y="9.75"
    width="20.5"
    height="12.5"
    rx="2.75"
    ry="2.75"
    fill="none"
    stroke="#FFF6D0"
    stroke-width="0.45"
    opacity="0.55"
  />

  <!-- Corner chamfers — ingot-style facets -->
  <path d="M8.2 9 L5 9 L5 12.2" fill="none" stroke="#FFF6D0" stroke-width="0.55" stroke-linecap="round" opacity="0.7"/>
  <path d="M23.8 9 L27 9 L27 12.2" fill="none" stroke="#FFF6D0" stroke-width="0.55" stroke-linecap="round" opacity="0.45"/>
  <path d="M8.2 23 L5 23 L5 19.8" fill="none" stroke="#6E520E" stroke-width="0.55" stroke-linecap="round" opacity="0.65"/>
  <path d="M23.8 23 L27 23 L27 19.8" fill="none" stroke="#6E520E" stroke-width="0.55" stroke-linecap="round" opacity="0.65"/>
</svg>
